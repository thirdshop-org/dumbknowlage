version: '3.8'

services:
  arangodb:
    image: arangodb:3.12
    container_name: whisper-nlp-arango
    ports:
      - "8529:8529"
    environment:
      ARANGO_ROOT_PASSWORD: whispernlp
    volumes:
      - arango_data:/var/lib/arangodb3
      - arango_apps:/var/lib/arangodb3-apps

volumes:
  arango_data:
  arango_apps:
